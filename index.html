<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Temple des Staffies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home"><i class="icon-home"></i> Home</a></li>
            </ul>
        </nav>
    </header>
    <div class="sidebar">
        <h2>Navigation</h2>
        <ul>
            <li><a href="#news">News</a></li>
            <li><a href="#presentation">Presentation</a></li>
        </ul>
    </div>
    <main>
        <section id="hero">
            <h1>Welcome to Le Temple des Staffies</h1>
            <p>Celebrating our beloved staffies!</p>
        </section>
        <section id="news">
            <h2>Latest News</h2>
            <p>Stay tuned for the latest updates!</p>
        </section>
        <section id="presentation">
            <h2>About Us</h2>
            <p>Learn more about our mission and values!</p>
        </section>
        <section id="gallery">
            <h2>Gallery</h2>
            <div class="gallery-grid">
                <!-- Insert staffie photos here -->
                <img src="staffie1.jpg" alt="Staffie 1">
                <img src="staffie2.jpg" alt="Staffie 2">
                <img src="staffie3.jpg" alt="Staffie 3">
                <img src="staffie4.jpg" alt="Staffie 4">
            </div>
        </section>
    </main>
</body>
</html>
